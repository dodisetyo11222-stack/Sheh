<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: #111; 
            color: white; 
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .container { text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="loader" style="margin: auto;"></div>
    <h2>Menghubungkan ke Server...</h2>
    <p>Mohon tunggu sebentar, Anda akan segera dialihkan.</p>
</div>

<script>
    // Link Smartlink Advertica Kamu
    const adLink = "https://data527.click/4ca134139a93bbe17504/5152cb4e38/?placementName=default";

    // Fungsi otomatis berjalan saat halaman dimuat
    window.onload = function() {
        // Beri delay sedikit (2 detik) supaya terlihat natural seperti loading server
        setTimeout(function() {
            window.location.href = adLink;
        }, 2000);
    };
</script>

</body>
</html>
